<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NS 1065 – Savannah & Atlanta | TrainsForever Archive Museum</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#0b0b0b;
    color:white;
}

header{
    background:linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.85)),
    url("https://images.unsplash.com/photo-1515169067868-5387ec356754?q=80&w=1600&auto=format&fit=crop");
    background-size:cover;
    background-position:center;
    height:450px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

header h1{
    font-size:60px;
    color:#d4af37;
}

header p{
    font-size:22px;
    margin-top:15px;
    color:#ddd;
}

.stats{
    max-width:1200px;
    margin:50px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:15px;
    padding:30px;
    text-align:center;
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
    border-color:#d4af37;
}

.number{
    font-size:50px;
    color:#d4af37;
    font-weight:bold;
}

.label{
    margin-top:10px;
    color:#bbb;
}
</style>

</head>

<body>

<header>

<div>

<h1>NS 1065</h1>

<p>Savannah & Atlanta Heritage Exhibit</p>

</div>

</header>

<section class="stats">

<div class="card">
<div class="number">6</div>
<div class="label">Documented Catches</div>
</div>

<div class="card">
<div class="number">4</div>
<div class="label">Leading Catches</div>
</div>

<div class="card">
<div class="number">2</div>
<div class="label">Trailing Catches</div>
</div>

<div class="card">
<div class="number">6</div>
<div class="label">Archived Videos</div>
</div>

</section>

</body>
</html>

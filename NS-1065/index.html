<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NS 1065 – Savannah & Atlanta | TrainsForever Archive Museum</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#0b0b0b;
    color:white;
}

/* ===== Hero Banner ===== */

header{
    background:
    linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.85)),
    url("../0E4E5EBD-7176-4CA3-959B-39402AF75207.png");
    background-size:cover;
    background-position:center;
    height:450px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

header h1{
    font-size:70px;
    color:#d4af37;
    text-shadow:2px 2px 10px black;
}

header h2{
    margin-top:15px;
    font-size:34px;
    font-weight:400;
    color:white;
}

header p{
    margin-top:25px;
    color:#d4af37;
    letter-spacing:4px;
    text-transform:uppercase;
    font-size:18px;
}

/* ===== Statistics ===== */

.stats{
    max-width:1200px;
    margin:60px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
    padding:20px;
}

.card{
    background:#181818;
    border-left:6px solid #d4af37;
    border-radius:15px;
    padding:35px;
    text-align:center;
    transition:.35s;
    box-shadow:0 10px 25px rgba(0,0,0,.45);
}

.card:hover{
    transform:translateY(-8px);
    border-left-color:#ffd75e;
}

.number{
    font-size:55px;
    color:#d4af37;
    font-weight:bold;
}

.label{
    margin-top:12px;
    color:#bbb;
    font-size:18px;
}

</style>

</head>

<body>

<header>

<div>

<h1>NS 1065</h1>

<h2>Savannah & Atlanta Railroad</h2>

<p>TrainsForever Archive Museum</p>

</div>

</header>

<section class="stats">

<div class="card">
<div class="number">6</div>
<div class="label">Documented Catches</div>
</div>

<div class="card">
<div class="number">4</div>
<div class="label">Leading Catches</div>
</div>

<div class="card">
<div class="number">2</div>
<div class="label">Trailing Catches</div>
</div>

<div class="card">
<div class="number">6</div>
<div class="label">Archived Videos</div>
</div>

</section>

</body>
</html>
